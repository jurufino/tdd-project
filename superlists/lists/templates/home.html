<!DOCTYPE html>
<html>
<head>
    <title>To-Do lists</title>
</head>
<body>

<h1>Start a new To-Do list</h1>

<form method="POST">
    {% csrf_token %}
    <input name="item_text" placeholder="Enter a to-do item" />
</form>

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}

</body>
</html>
