<!DOCTYPE html>
<html>
<head>
    <title>To-Do lists</title>
</head>
<body>

    <h1>List {{ list.id }}</h1>

    {% if error %}
        <div style="color: red;">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/lists/{{ list.id }}/">
        {% csrf_token %}
        <input name="item_text" placeholder="Enter a to-do item" />
    </form>

    <table>
        {% for item in items %}
            <tr>
                <td>{{ forloop.counter }}: {{ item.text }}</td>
            </tr>
        {% endfor %}
    </table>

</body>
</html>
