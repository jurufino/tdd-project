<!DOCTYPE html>
<html>
<head>
    <title>To-Do lists</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        table {
            margin: 20px auto;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>List {{ list.id }}</h1>

<form method="POST">
    {% csrf_token %}
    <input name="item_text" placeholder="Enter a to-do item" />
</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<table>
    {% for item in items %}
        <tr>
            <td>{{ forloop.counter }}: {{ item.text }}</td>
        </tr>
    {% endfor %}
</table>

</body>
</html>
