<!DOCTYPE html>
<html>
<head>
    <title>To-Do lists</title>
</head>
<body>

<h1>List {{ list.id }}</h1>

<form method="POST">
    {% csrf_token %}
    <input name="item_text" placeholder="Enter a to-do item" />
</form>

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}

<table>
    {% for item in items %}
        <tr>
            <td>{{ forloop.counter }}: {{ item.text }}</td>
        </tr>
    {% endfor %}
</table>

</body>
</html>
